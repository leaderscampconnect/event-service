server:
  port: 8081

spring:
  application:
    name: event-service
  config:
    import: optional:configserver:${CONFIG_SERVER_URL:http://localhost:8099}
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/event_db}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: always

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
